<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ukeplan — Lærere | Runni ungdomsskole</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="teacher.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="theme-color" content="#2563eb">
</head>
<body>

  <!-- Loading overlay -->
  <div id="overlay" class="overlay" role="status" aria-live="polite">
    <div class="overlay-inner">
      <div class="spinner"></div>
      <p class="overlay-text">Laster...</p>
    </div>
  </div>

  <!-- Login screen -->
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card" autocomplete="off">
      <h1 class="login-title">Ukeplan — Lærere</h1>
      <p class="login-sub">Runni ungdomsskole</p>
      <label class="login-label" for="loginName">Navn</label>
      <input type="text" id="loginName" class="input login-input" autocomplete="name" required>
      <label class="login-label" for="passwordInput">Passord</label>
      <input type="password" id="passwordInput" class="input login-input" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary login-btn">Logg inn</button>
      <p id="loginError" class="login-error" hidden></p>
    </form>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="page" hidden>
    <header class="site-header teacher-header">
      <div class="teacher-header-row">
        <div class="teacher-header-titles">
          <h1 class="site-title">Ukeplan — Lærere</h1>
          <p class="site-subtitle">Runni ungdomsskole</p>
        </div>
        <div class="teacher-header-actions">
          <label class="teacher-name-field">
            <span>Lærer</span>
            <input type="text" id="teacherName" class="input" placeholder="Navnet ditt" autocomplete="off">
          </label>
          <button id="refreshBtn" class="btn btn-ghost btn-tiny" title="Hent ferske data">&#8635;</button>
          <button id="logoutBtn" class="btn btn-ghost btn-tiny">Logg ut</button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="controls">
        <div class="controls-row">
          <button id="classBtn" class="class-pill" type="button" title="Bytt klasse">
            <span id="classBtnLabel" class="class-pill-label">Velg klasse</span>
            <span class="class-pill-change">bytt</span>
          </button>

          <div class="week-nav">
            <button id="prevWeekBtn" class="week-nav-btn" type="button" aria-label="Forrige uke">&lsaquo;</button>
            <div class="week-nav-center">
              <span id="weekLabel" class="week-label">Uke –</span>
              <span id="weekRange" class="week-range"></span>
            </div>
            <button id="nextWeekBtn" class="week-nav-btn" type="button" aria-label="Neste uke">&rsaquo;</button>
          </div>

          <div class="controls-actions">
            <button id="jumpTodayBtn" class="btn btn-ghost btn-tiny" title="Gå til denne uka">Denne uka</button>
            <span id="bgLoading" class="bg-loading" role="status" aria-live="polite"><span class="mini-spinner"></span></span>
          </div>
        </div>

        <div class="toolbar" id="toolbar">
          <button id="addBtn" class="btn btn-primary btn-tiny">+ Legg til</button>
          <button id="cloneBtn" class="btn btn-ghost btn-tiny" title="Kopier alt fra forrige uke til denne uka">&#10697; Kopier forrige uke</button>
          <button id="printBtn" class="btn btn-ghost btn-tiny" title="Skriv ut ukeplanen">&#128424; Skriv ut</button>
          <span id="saveStatus" class="save-status" aria-live="polite"></span>
        </div>
      </div>

      <div class="tabs">
        <button id="tTabUkeplan" class="tab active" type="button">Ukeplan</button>
        <button id="tTabVurd" class="tab" type="button">Vurderinger</button>
        <button id="tTabOversikt" class="tab" type="button">Oversikt</button>
      </div>

      <div id="paneUkeplan" class="tab-pane">
        <div id="generalSection" class="general-section"></div>
        <div id="board" class="board"></div>
      </div>

      <div id="paneVurd" class="tab-pane" hidden>
        <div class="pane-head">
          <h2 class="pane-title">Vurderinger – <span id="vurdClassLabel"></span></h2>
          <button id="addVurdBtn" class="btn btn-primary btn-tiny" type="button">+ Ny vurdering</button>
        </div>
        <div id="vurdTableWrap"></div>
      </div>

      <div id="paneOversikt" class="tab-pane" hidden>
        <div class="pane-head">
          <div class="view-toggle">
            <button id="ovModeCompare" class="vt-btn active" type="button">Sammenlign klasser</button>
            <button id="ovModeProg" class="vt-btn" type="button">Progresjon</button>
          </div>
          <label class="oversikt-field">Fag
            <select id="oversiktSubject" class="input"></select>
          </label>
          <label class="oversikt-field" id="ovGradeField">Trinn
            <select id="oversiktGrade" class="input">
              <option value="">Alle</option>
              <option value="8">8.</option>
              <option value="9">9.</option>
              <option value="10">10.</option>
            </select>
          </label>
          <label class="oversikt-field" id="ovClassField" hidden>Klasse
            <select id="oversiktClass" class="input"></select>
          </label>
          <label class="oversikt-field" id="ovRangeFromField" hidden>Fra uke
            <select id="ovFrom" class="input"></select>
          </label>
          <label class="oversikt-field" id="ovRangeToField" hidden>Til uke
            <select id="ovTo" class="input"></select>
          </label>
          <button id="ovTemaBtn" class="btn btn-primary btn-tiny" type="button" hidden>+ Tema for periode</button>
          <button id="ovExportBtn" class="btn btn-ghost btn-tiny" type="button" hidden>&#11015; Eksporter .docx</button>
          <span id="oversiktWeek" class="oversikt-caption"></span>
        </div>
        <div id="oversiktBoard"></div>
      </div>
    </main>

    <footer class="site-footer no-print">
      <p id="lastUpdated" class="last-updated"></p>
      <p class="copyright">Copyright Benjamin Ensrud 2026</p>
    </footer>
  </div>

  <!-- Class selection modal -->
  <div id="classModalOverlay" class="class-modal-overlay"></div>
  <div id="classModal" class="class-modal" role="dialog" aria-modal="true" aria-labelledby="classModalTitle">
    <div class="class-modal-header">
      <h2 id="classModalTitle" class="class-modal-title">Velg klasse</h2>
      <button id="classModalClose" class="panel-close" aria-label="Lukk">&times;</button>
    </div>
    <p class="class-modal-hint">Velg klassen du vil redigere ukeplan for.</p>
    <div id="classModalGrid" class="class-modal-grid"></div>
  </div>

  <!-- Add / edit modal -->
  <div id="modalOverlay" class="class-modal-overlay"></div>
  <div id="addModal" class="class-modal add-modal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
    <div class="class-modal-header">
      <h2 id="addModalTitle" class="class-modal-title">Legg til element</h2>
      <button id="addModalClose" class="panel-close" aria-label="Lukk">&times;</button>
    </div>

    <div class="form-row">
      <label class="form-label">Type</label>
      <div id="typeBtns" class="type-btns"></div>
    </div>

    <div class="form-row" id="weekRangeRow">
      <label class="form-label">Uke (fra–til)</label>
      <div class="week-range-pick">
        <select id="weekFrom" class="input"></select>
        <span class="week-range-sep">til</span>
        <select id="weekTo" class="input"></select>
      </div>
    </div>

    <div class="form-row" id="dateRow" style="display:none">
      <label class="form-label" for="dateInput">Dato</label>
      <input type="date" id="dateInput" class="input">
    </div>

    <div class="form-row" id="subjectRow">
      <label class="form-label" for="subjectSelect">Fag</label>
      <select id="subjectSelect" class="input"></select>
    </div>

    <div class="form-row">
      <label class="form-label">Klasse(r)</label>
      <div id="classBtns" class="class-modal-grid"></div>
    </div>

    <div class="form-row" id="dayRow">
      <label class="form-label">Dag(er) (valgfritt – tomt = hele uka)</label>
      <div id="dayBtns" class="day-btns"></div>
    </div>

    <div class="form-row">
      <label class="form-label" for="descInput">Innhold</label>
      <textarea id="descInput" class="input desc-input" rows="3"></textarea>
    </div>

    <div id="conflictPanel" class="conflict-panel" hidden></div>

    <div class="add-modal-actions">
      <button id="addDelete" class="btn btn-danger" hidden>Slett</button>
      <span class="add-modal-spacer"></span>
      <button id="addCancel" class="btn btn-ghost">Avbryt</button>
      <button id="addSave" class="btn btn-primary">Lagre</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden>
    <span class="toast-msg"></span>
    <button type="button" class="toast-action" hidden></button>
  </div>

  <script src="rich.js"></script>
  <script src="docx.js"></script>
  <script src="teacher.js"></script>
</body>
</html>
